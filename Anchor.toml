[features]
seeds = false
skip-lint = false

[programs.localnet]
crimson_vault = "CrmsnVLT1111111111111111111111111111111111"
crimson_adaptor = "CrmsnADP1111111111111111111111111111111111"

[programs.devnet]
crimson_vault = "CrmsnVLT1111111111111111111111111111111111"
crimson_adaptor = "CrmsnADP1111111111111111111111111111111111"

[programs.mainnet]
crimson_vault = "CrmsnVLT1111111111111111111111111111111111"
crimson_adaptor = "CrmsnADP1111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = [
    "programs/crimson-vault",
    "programs/crimson-adaptor"
]

[test]
startup_wait = 5000
shutdown_wait = 2000
