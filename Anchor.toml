[features]
seeds = false
skip-lint = false

[programs.localnet]
ctoken_market_program = "CtkMkt11111111111111111111111111111111111111"
custom_adaptor_program = "CustAdpt11111111111111111111111111111111111"

[programs.devnet]
ctoken_market_program = "CtkMkt11111111111111111111111111111111111111"
custom_adaptor_program = "CustAdpt11111111111111111111111111111111111"

[programs.mainnet]
ctoken_market_program = "CtkMkt11111111111111111111111111111111111111"
custom_adaptor_program = "CustAdpt11111111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[workspace]
members = [
    "programs/ctoken-market-program",
    "programs/custom-adaptor-program"
]

[test]
startup_wait = 5000
shutdown_wait = 2000

# Clone Ranger/Voltr programs for localnet testing
[test.validator]
url = "https://api.devnet.solana.com"

